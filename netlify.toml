# Netlify deploy config for the portfolio (Vite SPA).

[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# SPA fallback — single page, but keeps deep links / hash routes happy.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Long-cache fingerprinted assets.
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-Frame-Options = "SAMEORIGIN"
